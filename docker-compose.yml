version: '3.9'

services:
  mongodb:
    image: mongo:6.0-alpine
    container_name: youtube-rec-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: youtube_recommendation
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: youtube-rec-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: youtube-rec-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://admin:password@mongodb:27017/youtube_recommendation
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your-jwt-secret-change-in-production
      LOG_LEVEL: debug
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/backend/src
    command: npm run dev --workspace=backend

  ml-service:
    build:
      context: .
      dockerfile: Dockerfile.ml
      target: ml-service
    container_name: youtube-rec-ml
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: 1
      LOG_LEVEL: INFO
      MONGODB_URI: mongodb://admin:password@mongodb:27017/youtube_recommendation
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./ml-service/src:/app/src
      - ./ml-service/models:/app/models
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    container_name: youtube-rec-frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
      REACT_APP_ML_URL: http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/frontend/src
    command: npm run dev --workspace=frontend

volumes:
  mongo_data:
  redis_data:

networks:
  default:
    name: youtube-recommendation-network
